<!DOCTYPE html>
<html>
<head>
<title>Advanced Matrix Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Advanced Matrix Calculator</h1>

<div class="box">

<h3>Matrix A</h3>
<textarea id="matrixA" placeholder="Example:
1 2
3 4"></textarea>

<h3>Matrix B</h3>
<textarea id="matrixB" placeholder="Example:
5 6
7 8"></textarea>

<div class="buttons">
<button onclick="addMatrices()">Addition</button>
<button onclick="multiplyMatrices()">Multiplication</button>
<button onclick="transposeA()">Transpose A</button>
<button onclick="transposeB()">Transpose B</button>
</div>

<h3>Result</h3>
<pre id="result"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
